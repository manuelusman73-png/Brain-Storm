[advisories]
# The lint level for crates which do not have a detectable license
unlicensed = "deny"
# The lint level used when no other predicates are matched
default = "warn"
# The confidence threshold for advisories, any advisory with a confidence
# lower than this will be ignored
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
# A list of advisory IDs to ignore. Note that ignored advisories will still
# output a note when they are encountered.
ignore = []

[licenses]
# The lint level for crates which do not have a detectable license
unlicensed = "deny"
# List of explicitly allowed licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 OR MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
# List of explicitly disallowed licenses
deny = ["GPL-2.0", "GPL-3.0", "AGPL-3.0"]
# Lint level for licenses considered copyleft
copyleft = "warn"
# Blanket approval or denial for OSI-approved or FSF Free/Libre licenses
allow-osi-fsf-free = "both"
# Lint level used when no other predicates are matched
default = "deny"
# The confidence threshold for detecting a license from license text.
confidence-threshold = 0.8

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when an unmaintained crate is detected
unmaintained = "warn"
# Lint level for when a crate with security notices is detected
notice = "warn"
# A list of explicitly allowed duplicate crates
allow = []
# A list of explicitly disallowed duplicate crates
deny = []
# Certain crates/versions that will be skipped when doing duplicate detection.
skip = []
# Similarly named crates that are allowed to coexist
skip-tree = []

[sources]
# Lint level for what to happen when a crate from a crate registry that is not in the allow list is detected
unknown-registry = "warn"
# Lint level for what to happen when a crate from a git repository that is not in the allow list is detected
unknown-git = "warn"
# List of allowed crate registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of allowed Git repositories
allow-git = []
