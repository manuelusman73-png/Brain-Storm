name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Install · Build · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build backend
        run: npm run build --workspace=apps/backend

      - name: Run unit tests with coverage
        run: npx jest --coverage --passWithNoTests
        working-directory: apps/backend

      - name: Run Pact provider verification
        run: npm run test:pact --workspace=apps/backend
        continue-on-error: true

  frontend-build:
    name: Frontend — Install · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build --workspace=apps/frontend

  chromatic-visual-tests:
    name: Frontend — Visual Regression Tests (Chromatic)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Storybook
        run: npm run build-storybook --workspace=apps/frontend

      - name: Publish to Chromatic
        uses: chromaui/action@v1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: apps/frontend/storybook-static
          exitZeroOnChanges: true

  contracts-check:
    name: Contracts — Test · Format · Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: cargo test
        run: cargo test

      - name: cargo test with fuzz (60s timeout)
        run: timeout 60 cargo test --lib fuzz || true

      - name: cargo fmt check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy -- -D warnings
