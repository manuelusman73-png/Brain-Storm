sonar.projectKey=BrainTease_Brain-Storm
sonar.projectName=Brain-Storm
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=apps/backend/src,apps/frontend/src,contracts/src
sonar.exclusions=**/*.spec.ts,**/*.test.ts,**/*.pact.test.ts,**/node_modules/**,**/dist/**,**/coverage/**,**/.next/**

# Test coverage
sonar.javascript.lcov.reportPaths=apps/frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=apps/backend/coverage/lcov.info

# Quality gate
sonar.qualitygate.wait=true

# Language settings
sonar.language=ts
