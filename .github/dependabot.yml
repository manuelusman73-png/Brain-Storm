version: 2
updates:
  # Frontend npm dependencies
  - package-ecosystem: npm
    directory: "/apps/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "brain-tease"
    assignees:
      - "brain-tease"
    commit-message:
      prefix: "chore(deps-frontend):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    groups:
      minor-and-patch:
        dependency-types:
          - "minor"
          - "patch"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # Backend npm dependencies
  - package-ecosystem: npm
    directory: "/apps/backend"
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
    open-pull-requests-limit: 10
    reviewers:
      - "brain-tease"
    assignees:
      - "brain-tease"
    commit-message:
      prefix: "chore(deps-backend):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    groups:
      minor-and-patch:
        dependency-types:
          - "minor"
          - "patch"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # Cargo dependencies (Rust contracts)
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 10
    reviewers:
      - "brain-tease"
    assignees:
      - "brain-tease"
    commit-message:
      prefix: "chore(deps-contracts):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    groups:
      minor-and-patch:
        dependency-types:
          - "minor"
          - "patch"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
    open-pull-requests-limit: 5
    reviewers:
      - "brain-tease"
    assignees:
      - "brain-tease"
    commit-message:
      prefix: "chore(ci):"
      include: "scope"
