name: Deploy to Production

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-approval:
    name: Request Production Approval
    runs-on: ubuntu-latest
    needs: build-and-push

    environment:
      name: production
      url: https://api.brain-storm.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Production deployment for ${{ github.event.release.tag_name }}',
              required_contexts: [],
              auto_merge: false,
            });
            core.setOutput('deployment-id', deployment.data.id);

      - name: Deployment status - pending
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment-id }},
              state: 'pending',
              description: 'Waiting for approval...',
            });

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-approval]

    environment:
      name: production
      url: https://api.brain-storm.example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull latest image
        run: |
          docker pull ${{ needs.build-and-push.outputs.image-tag }}

      - name: Run database migrations
        run: |
          docker run --rm \
            -e DATABASE_HOST=${{ secrets.DATABASE_HOST }} \
            -e DATABASE_PORT=${{ secrets.DATABASE_PORT }} \
            -e DATABASE_USERNAME=${{ secrets.DATABASE_USERNAME }} \
            -e DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} \
            -e DATABASE_NAME=${{ secrets.DATABASE_NAME }} \
            ${{ needs.build-and-push.outputs.image-tag }} \
            npm run migration:run
        continue-on-error: false

      - name: Deploy to production
        run: |
          # Example: Deploy using your infrastructure tool (ECS, K8s, etc.)
          # This is a placeholder - adjust based on your deployment infrastructure
          echo "Deploying ${{ needs.build-and-push.outputs.image-tag }} to production"
          echo "Release tag: ${{ github.event.release.tag_name }}"
          
          # Example for ECS:
          # aws ecs update-service \
          #   --cluster production \
          #   --service brain-storm-backend \
          #   --force-new-deployment

      - name: Health check
        run: |
          MAX_RETRIES=30
          RETRY_INTERVAL=10
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f https://api.brain-storm.example.com/health; then
              echo "✅ Health check passed"
              exit 0
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Health check attempt $RETRY_COUNT/$MAX_RETRIES failed, retrying in ${RETRY_INTERVAL}s..."
            sleep $RETRY_INTERVAL
          done
          
          echo "❌ Health check failed after $MAX_RETRIES attempts"
          exit 1

      - name: Deployment status - success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.deploy-approval.outputs.deployment-id }},
              state: 'success',
              description: 'Successfully deployed to production',
              environment_url: 'https://api.brain-storm.example.com',
            });

      - name: Deployment status - failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.deploy-approval.outputs.deployment-id }},
              state: 'failure',
              description: 'Deployment failed',
            });

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: failure()

    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get previous release tag
        id: previous-tag
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 2,
            });
            
            if (releases.data.length < 2) {
              core.setFailed('No previous release found for rollback');
              return;
            }
            
            const previousTag = releases.data[1].tag_name;
            core.setOutput('tag', previousTag);
            console.log(`Previous release tag: ${previousTag}`);

      - name: Rollback to previous version
        if: steps.previous-tag.outputs.tag
        run: |
          PREVIOUS_TAG=${{ steps.previous-tag.outputs.tag }}
          PREVIOUS_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${PREVIOUS_TAG}"
          
          echo "Rolling back to $PREVIOUS_IMAGE"
          
          # Example for ECS:
          # aws ecs update-service \
          #   --cluster production \
          #   --service brain-storm-backend \
          #   --force-new-deployment

      - name: Notify rollback
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🔄 **Deployment Rollback**\n\nProduction deployment failed and has been rolled back to the previous version.\n\nRelease: ${{ github.event.release.tag_name }}\nPrevious version: ${{ steps.previous-tag.outputs.tag }}`
            });
