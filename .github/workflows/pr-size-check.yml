name: PR Size Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  size-check:
    name: Check PR Size
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR size
        id: size
        run: |
          # Get the base and head commits
          BASE_COMMIT=${{ github.event.pull_request.base.sha }}
          HEAD_COMMIT=${{ github.event.pull_request.head.sha }}
          
          # Count changed lines (additions + deletions)
          CHANGED_LINES=$(git diff --stat $BASE_COMMIT..$HEAD_COMMIT | tail -1 | awk '{print $4}' | tr -d ',')
          
          echo "changed_lines=$CHANGED_LINES" >> $GITHUB_OUTPUT
          echo "PR changed $CHANGED_LINES lines"

      - name: Comment on PR if large
        if: steps.size.outputs.changed_lines > 500
        uses: actions/github-script@v7
        with:
          script: |
            const changedLines = ${{ steps.size.outputs.changed_lines }};
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Large PR Warning**\n\nThis PR changes **${changedLines} lines** of code (threshold: 500 lines).\n\nConsider breaking this into smaller, more focused PRs for easier review and faster merge times.`
            });

      - name: Set status
        run: |
          CHANGED_LINES=${{ steps.size.outputs.changed_lines }}
          if [ "$CHANGED_LINES" -gt 500 ]; then
            echo "⚠️ PR size warning: $CHANGED_LINES lines changed (> 500)"
            exit 0  # Don't fail, just warn
          fi
          echo "✅ PR size OK: $CHANGED_LINES lines changed"
